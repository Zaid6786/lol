<div class="profile-wrapper">
  <div class="page-header">
    <h1 class="page-title">My Profile</h1>
    <p class="page-subtitle">Manage your personal information and preferences.</p>
  </div>
  
  <div class="profile-layout-grid">
    <!-- Left Panel: Avatar & Card -->
    <div class="glass-panel profile-sidebar-card">
      <div class="avatar-container">
        <div class="avatar-glow"></div>
        <div class="profile-avatar">
          {{ student.name ? student.name.substring(0, 2).toUpperCase() : 'ST' }}
        </div>
      </div>
      <h2 class="student-name">{{ student.name || 'Student Name' }}</h2>
      <p class="student-roll">{{ student.rollNo || 'Roll No' }}</p>
      <button type="button" class="btn-change-photo">Change Photo</button>
    </div>

    <!-- Right Panel: Fields Form -->
    <div class="glass-panel profile-form-card">
      <h3 class="form-title">Personal Information</h3>
      <form (ngSubmit)="saveChanges()">
        <div class="fields-grid">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="input-field" [(ngModel)]="student.name" name="name">
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" class="input-field" [(ngModel)]="student.email" name="email">
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" class="input-field" [(ngModel)]="student.phone" name="phone">
          </div>
          <div class="form-group">
            <label>Default Route</label>
            <select class="input-field select-field" [(ngModel)]="student.route" name="route">
              <option value="Route A">Route A</option>
              <option value="Route B">Route B</option>
              <option value="Route C">Route C</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn-primary btn-save">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
          <span>Save Changes</span>
        </button>
      </form>
    </div>
  </div>
</div>
