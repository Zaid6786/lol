<div class="bus-list-wrapper">
  <div class="page-header">
    <h1 class="page-title">Live Buses</h1>
    <p class="page-subtitle">Track buses currently operating on your campus.</p>
  </div>

  <div class="filter-bar">
    <div class="search-container">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input type="text" class="input-field search-input" placeholder="Search by route or bus number..." (input)="onSearch($event)">
    </div>
    <button class="btn-primary map-btn" routerLink="/student/live-map">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
        <polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"></polygon>
      </svg>
      <span>View Live Map</span>
    </button>
  </div>

  <div class="bus-grid">
    <div *ngIf="filteredBuses.length === 0" class="glass-panel no-results">
      <svg class="info-icon" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <p>No active buses match your search.</p>
    </div>

    <div *ngFor="let bus of filteredBuses" class="glass-panel bus-card">
      <div class="card-header">
        <div class="bus-info">
          <h2>Bus #{{ bus.busId }}</h2>
          <span class="route-code">{{ bus.routeCode || 'Unassigned Route' }}</span>
        </div>
        <span class="status-badge" [class.active-badge]="bus.status === 'ACTIVE'">
          {{ bus.status }}
        </span>
      </div>

      <div class="card-body">
        <div class="meta-row">
          <span class="label">Current Stop:</span>
          <span class="value highlight-val">{{ bus.currentStop || 'In Transit' }}</span>
        </div>
        <div class="meta-row">
          <span class="label">Capacity:</span>
          <span class="value">{{ bus.capacity }} seats</span>
        </div>
      </div>

      <div class="card-footer">
        <button class="btn-primary track-btn" [routerLink]="['/student/buses', bus.busId]">
          <span>Track Live</span>
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
