<div class="notifications-wrapper">
  <div class="page-header">
    <h1 class="page-title">Notifications</h1>
    <p class="page-subtitle">Important alerts and updates about your buses.</p>
  </div>

  <div class="notifications-list">
    <div *ngIf="notifications.length === 0" class="glass-panel no-notifications">
      <svg class="empty-icon" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
      </svg>
      <p>You have no notifications.</p>
    </div>

    <div *ngFor="let notification of notifications" class="glass-panel notification-item" 
         [class.unread-item]="!notification.isRead">
      <div class="item-main">
        <div class="item-header">
          <h3 class="item-title">{{ notification.title }}</h3>
          <span *ngIf="!notification.isRead" class="badge-new">NEW</span>
        </div>
        <p class="item-time">
          <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="10"></circle>
            <polyline points="12 6 12 12 16 14"></polyline>
          </svg>
          {{ notification.createdAt | date:'medium' }}
        </p>
        <p class="item-message">{{ notification.message }}</p>
      </div>
      
      <div class="item-actions">
        <button *ngIf="!notification.isRead" 
                class="btn-mark-read" 
                (click)="markAsRead(notification.notificationId)">
          <span>Mark as Read</span>
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
