<div class="login-wrapper student-theme">
  <div class="glass-panel login-card">
    <div class="login-header">
      <div class="icon-glow">
        <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
          <path d="M6 12v5c0 2 2 3 6 3s6-1 6-3v5"></path>
        </svg>
      </div>
      <h2>Student Login</h2>
      <p>Enter your student credentials to track your bus</p>
    </div>

    <div class="error-banner" *ngIf="errorMessage">
      <svg class="error-icon" viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage }}</span>
    </div>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="studentId">Student ID / Roll No</label>
        <div class="input-container">
          <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="studentId" class="input-field icon-indent" placeholder="e.g. STU12345" [(ngModel)]="studentId" name="studentId" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-container">
          <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" class="input-field icon-indent" placeholder="••••••••" [(ngModel)]="password" name="password" required>
        </div>
      </div>
      
      <button type="submit" class="btn-primary login-btn">
        <span>Sign In</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
    
    <div class="login-footer">
      <a routerLink="/admin/login">Are you an administrator? <span>Access admin panel</span></a>
    </div>
  </div>
</div>
