<div class="map-wrapper">
  <!-- Map Header Title -->
  <div class="map-header">
    <div>
      <h1 class="page-title">Live Bus Tracker</h1>
      <p class="page-subtitle">Track your buses in real-time or simulate location sharing.</p>
    </div>
    <div class="header-actions">
      <button class="btn-primary refresh-btn" (click)="loadBuses()">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"></path>
        </svg>
        <span>Refresh Fleet</span>
      </button>
    </div>
  </div>

  <!-- Map Layout Frame -->
  <div class="map-frame-container">
    <!-- Mapbox Map container -->
    <div id="mapbox-container" class="glass-panel main-map"></div>

    <!-- Floating Driver Simulator Panel -->
    <div class="glass-panel tracking-panel">
      <div class="panel-header">
        <svg class="panel-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="2" y1="12" x2="22" y2="12"></line>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <h3>Driver Simulation</h3>
      </div>
      <div class="panel-body">
        <p class="desc">Select a bus to simulate driving and share live coordinates in real-time.</p>
        
        <div class="form-group">
          <label>Select Bus to Drive</label>
          <select class="input-field select-bus" [(ngModel)]="selectedBusId" [disabled]="isTracking">
            <option *ngFor="let bus of buses" [value]="bus.busId">
              Bus #{{ bus.busId }} ({{ bus.routeCode || 'Unassigned' }})
            </option>
          </select>
        </div>

        <div class="tracking-status-row">
          <span class="lbl">GPS Tracker:</span>
          <span class="val status-indicator" [class.active]="isTracking">
            <span class="indicator-dot" [class.pulse]="isTracking"></span>
            {{ trackingStatus }}
          </span>
        </div>

        <button class="btn-primary tracking-toggle-btn" 
                [class.btn-stop]="isTracking" 
                (click)="toggleTracking()">
          <svg *ngIf="!isTracking" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg *ngIf="isTracking" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5">
            <rect x="4" y="4" width="16" height="16" rx="2" ry="2"></rect>
          </svg>
          <span>{{ isTracking ? 'Stop Sharing Location' : 'Start Sharing Location' }}</span>
        </button>
      </div>
    </div>
  </div>
</div>
