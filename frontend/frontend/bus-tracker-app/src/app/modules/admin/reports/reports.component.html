<div class="page-header" style="margin-bottom: 25px;">
  <h1 style="color: var(--color-primary); font-size: 1.8rem; margin-bottom: 5px;">System Reports</h1>
  <p style="color: var(--text-muted);">Generate and download analytics and operational reports.</p>
</div>

<div class="glass-panel" style="padding: 30px;">
  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
    
    <div style="border: 1px solid var(--border-color); padding: 20px; border-radius: var(--radius-md);">
      <h3 style="color: var(--text-main); margin-bottom: 10px;">Daily Attendance</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Total students boarded per route today.</p>
      <button class="btn-primary" style="background: var(--color-secondary); width: 100%;">Generate Report</button>
    </div>

    <div style="border: 1px solid var(--border-color); padding: 20px; border-radius: var(--radius-md);">
      <h3 style="color: var(--text-main); margin-bottom: 10px;">Bus Maintenance</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Log of delayed buses and maintenance alerts.</p>
      <button class="btn-primary" style="background: var(--color-secondary); width: 100%;">Generate Report</button>
    </div>

    <div style="border: 1px solid var(--border-color); padding: 20px; border-radius: var(--radius-md);">
      <h3 style="color: var(--text-main); margin-bottom: 10px;">Route Efficiency</h3>
      <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 20px;">Average completion time vs scheduled time.</p>
      <button class="btn-primary" style="background: var(--color-secondary); width: 100%;">Generate Report</button>
    </div>

  </div>
</div>
