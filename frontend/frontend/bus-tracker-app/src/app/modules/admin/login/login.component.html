<div class="login-wrapper admin-theme">
  <div class="glass-panel login-card">
    <div class="login-header">
      <div class="icon-glow">
        <svg viewBox="0 0 24 24" width="42" height="42" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
      </div>
      <h2>Admin Login</h2>
      <p>Enter administrator credentials to access the fleet dashboard</p>
    </div>
    
    <form (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-container">
          <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
            <circle cx="12" cy="7" r="4"></circle>
          </svg>
          <input type="text" id="username" class="input-field icon-indent" placeholder="e.g. admin_main" [(ngModel)]="username" name="username" required>
        </div>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-container">
          <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <input type="password" id="password" class="input-field icon-indent" placeholder="••••••••" [(ngModel)]="password" name="password" required>
        </div>
      </div>
      
      <button type="submit" class="btn-primary login-btn">
        <span>Dashboard Login</span>
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>
    </form>
    
    <div class="login-footer">
      <a routerLink="/student/login">Are you a student? <span>Access tracker here</span></a>
    </div>
  </div>
</div>
