<div class="page-header" style="margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center;">
  <div>
    <h1 style="color: var(--color-primary); font-size: 1.8rem; margin-bottom: 5px;">Manage Stops</h1>
    <p style="color: var(--text-muted);">View and define bus stops and geofences.</p>
  </div>
  <button class="btn-primary" style="background: var(--color-accent);" (click)="openModal()">+ Add New Stop</button>
</div>

<div class="glass-panel" style="padding: 25px;">
  <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
    <input type="text" class="input-field" placeholder="Search stops by name..." style="max-width: 300px;" (input)="onSearch($event)">
  </div>

  <table style="width: 100%; border-collapse: collapse; text-align: left;">
    <thead>
      <tr style="border-bottom: 2px solid var(--border-color); color: var(--text-muted);">
        <th style="padding: 12px 10px;">Stop Name</th>
        <th style="padding: 12px 10px;">Latitude</th>
        <th style="padding: 12px 10px;">Longitude</th>
        <th style="padding: 12px 10px; text-align: right;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="filteredStops.length === 0">
        <td colspan="4" style="padding: 20px; text-align: center; color: var(--text-muted);">No stops found.</td>
      </tr>
      <tr *ngFor="let stop of filteredStops" style="border-bottom: 1px solid var(--border-color);">
        <td style="padding: 15px 10px; font-weight: 500;">{{ stop.name }}</td>
        <td style="padding: 15px 10px;">{{ stop.latitude }}</td>
        <td style="padding: 15px 10px;">{{ stop.longitude }}</td>
        <td style="padding: 15px 10px; text-align: right;">
          <button (click)="openModal(stop)" style="background: transparent; border: none; color: var(--color-primary); margin-right: 10px; cursor: pointer;">Edit</button>
          <button (click)="deleteStop(stop.stopId)" style="background: transparent; border: none; color: var(--color-danger); cursor: pointer;">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>

<!-- Modal for Create/Edit -->
<div *ngIf="showModal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000;">
  <div class="glass-panel" style="padding: 30px; width: 400px; background: var(--bg-body);">
    <h2 style="color: var(--text-main); margin-bottom: 20px;">{{ isEditing ? 'Edit Stop' : 'Add New Stop' }}</h2>
    
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; color: var(--text-main);">Stop Name</label>
      <input type="text" class="input-field" [(ngModel)]="currentStop.name">
    </div>
    
    <div style="margin-bottom: 15px;">
      <label style="display: block; margin-bottom: 5px; color: var(--text-main);">Latitude</label>
      <input type="number" step="0.0001" class="input-field" [(ngModel)]="currentStop.latitude">
    </div>

    <div style="margin-bottom: 25px;">
      <label style="display: block; margin-bottom: 5px; color: var(--text-main);">Longitude</label>
      <input type="number" step="0.0001" class="input-field" [(ngModel)]="currentStop.longitude">
    </div>

    <div style="display: flex; justify-content: flex-end; gap: 10px;">
      <button class="btn-primary" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); box-shadow: none;" (click)="closeModal()">Cancel</button>
      <button class="btn-primary" style="background: var(--color-accent);" (click)="saveStop()">Save</button>
    </div>
  </div>
</div>
